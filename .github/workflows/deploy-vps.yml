name: Deploy VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/telegram-content-hub
            git fetch origin master
            git reset --hard origin/master

            if [ ! -f /swapfile ]; then
              fallocate -l 2G /swapfile
              chmod 600 /swapfile
              mkswap /swapfile
              swapon /swapfile
              echo '/swapfile none swap sw 0 0' >> /etc/fstab
            else
              swapon /swapfile || true
            fi

            export COMPOSE_PARALLEL_LIMIT=1
            docker compose --env-file .env -p telegram-content-hub up -d postgres minio createbuckets
            nice -n 15 docker compose --env-file .env -p telegram-content-hub build api
            docker compose --env-file .env -p telegram-content-hub up -d api
            nice -n 15 docker compose --env-file .env -p telegram-content-hub build web worker
            docker compose --env-file .env -p telegram-content-hub up -d web worker
            docker compose --env-file .env -p telegram-content-hub ps
