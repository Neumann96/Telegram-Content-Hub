name: Deploy VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  API_IMAGE: ghcr.io/neumann96/telegram-content-hub-api
  WEB_IMAGE: ghcr.io/neumann96/telegram-content-hub-web
  WORKER_IMAGE: ghcr.io/neumann96/telegram-content-hub-worker
  PUBLIC_URL: https://telegram-content-hub.147-45-224-216.sslip.io

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.API_IMAGE }}:latest

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.PUBLIC_URL }}
          tags: |
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
            ${{ env.WEB_IMAGE }}:latest

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: ./apps/worker
          push: true
          tags: |
            ${{ env.WORKER_IMAGE }}:${{ github.sha }}
            ${{ env.WORKER_IMAGE }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/telegram-content-hub
            git fetch origin master
            git reset --hard origin/master

            if [ ! -f /swapfile ]; then
              fallocate -l 2G /swapfile
              chmod 600 /swapfile
              mkswap /swapfile
              swapon /swapfile
              echo '/swapfile none swap sw 0 0' >> /etc/fstab
            else
              swapon /swapfile || true
            fi

            python3 - <<'PY'
            from pathlib import Path

            env_path = Path(".env")
            values = {}
            if env_path.exists():
                for line in env_path.read_text().splitlines():
                    if "=" in line and not line.strip().startswith("#"):
                        key, value = line.split("=", 1)
                        values[key] = value

            values.update({
                "API_IMAGE": "ghcr.io/neumann96/telegram-content-hub-api:${{ github.sha }}",
                "WEB_IMAGE": "ghcr.io/neumann96/telegram-content-hub-web:${{ github.sha }}",
                "WORKER_IMAGE": "ghcr.io/neumann96/telegram-content-hub-worker:${{ github.sha }}",
                "NEXT_PUBLIC_API_URL": "https://telegram-content-hub.147-45-224-216.sslip.io",
                "WEB_ALLOWED_ORIGINS": "https://telegram-content-hub.147-45-224-216.sslip.io,http://telegram-content-hub.147-45-224-216.sslip.io,http://localhost:3000",
            })

            order = [
                "COMPOSE_PROJECT_NAME",
                "POSTGRES_DB",
                "POSTGRES_USER",
                "POSTGRES_PASSWORD",
                "POSTGRES_HOST",
                "POSTGRES_PORT",
                "MINIO_ROOT_USER",
                "MINIO_ROOT_PASSWORD",
                "MINIO_ENDPOINT",
                "MINIO_BUCKET",
                "MINIO_USE_SSL",
                "API_PORT",
                "API_BASE_URL",
                "NEXT_PUBLIC_API_URL",
                "WEB_ALLOWED_ORIGINS",
                "TELEGRAM_BOT_TOKEN",
                "TELEGRAM_LOGIN_BOT_USERNAME",
                "TELEGRAM_API_ID",
                "TELEGRAM_API_HASH",
                "TELEGRAM_WORKER_SESSION",
                "API_IMAGE",
                "WEB_IMAGE",
                "WORKER_IMAGE",
            ]
            env_path.write_text("\n".join(f"{key}={values.get(key, '')}" for key in order) + "\n")
            PY

            docker compose -f compose.prod.yaml --env-file .env -p telegram-content-hub pull api web worker
            docker compose -f compose.prod.yaml --env-file .env -p telegram-content-hub up -d postgres minio createbuckets api web worker
            docker compose -f compose.prod.yaml --env-file .env -p telegram-content-hub ps
