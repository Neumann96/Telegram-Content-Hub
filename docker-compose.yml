services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-telegram_content_hub}
      POSTGRES_USER: ${POSTGRES_USER:-telegram_hub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telegram_hub_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-telegram_hub} -d ${POSTGRES_DB:-telegram_content_hub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123};
      mc mb --ignore-existing local/${MINIO_BUCKET:-telegram-media};
      mc anonymous set none local/${MINIO_BUCKET:-telegram-media};
      "

  api:
    build:
      context: ./apps/api
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: postgres
      MINIO_ENDPOINT: minio:9000
    ports:
      - "${API_PORT:-8080}:8080"

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3000:3000"

  worker:
    build:
      context: ./apps/worker
    depends_on:
      - api
    env_file:
      - path: .env
        required: false
    environment:
      API_BASE_URL: http://api:8080
    volumes:
      - worker_data:/app/data

volumes:
  postgres_data:
  minio_data:
  worker_data:
